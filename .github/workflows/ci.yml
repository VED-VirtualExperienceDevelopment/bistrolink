  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: "20"
  #         cache: npm

  #     - name: Instalar dependencias
  #       run: npm ci

  #     - name: Tests Jest (cobertura mínima 80%)
  #       run: npm run test:cov --workspace=backend
  #       env:
  #         CI: true

  #     - name: Upload results to Testiny
  #       if: always()
  #       env:
  #         TESTINY_API_KEY: ${{ secrets.TESTINY_API_KEY }}
  #       run: npx -y @testiny/cli automation --format junit --input coverage/junit.xml --project "BISTROLINK-VED"

  # ── JOB 3: TESTS DE CONTRATO (PactJS) ────────────────────────────────────
  # pact:
  #   name: 🤝 Tests de contrato (PactJS)
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4

  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: "20"
  #         cache: npm

  #     - name: Instalar dependencias
  #       run: npm ci

  #     - name: Tests de contrato PactJS
  #       run: npm run test:pact

  # ── JOB 4: GITLEAKS ───────────────────────────────────────────────────────
  gitleaks:
    name: 🔐 Secretos (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Escaneo de secretos con Gitleaks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        run: |
          set -euo pipefail
          VERSION=8.12.0
          TMPDIR=$(mktemp -d)
          curl -sSL -o "${TMPDIR}/gitleaks.tar.gz" \
            "https://github.com/zricethezav/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          mkdir -p "${TMPDIR}/bin"
          tar -xzf "${TMPDIR}/gitleaks.tar.gz" -C "${TMPDIR}/bin"
          "${TMPDIR}/bin/gitleaks" detect \
            --redact -v \
            --exit-code=2 \
            --report-format=sarif \
            --report-path=gitleaks-results \
            --log-level=debug \
            --log-opts="--no-merges"

      - name: Subir reporte Gitleaks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: gitleaks-results

  # ── JOB 5: CODEQL ─────────────────────────────────────────────────────────
  codeql:
    name: 🛡️ SAST (CodeQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: CodeQL — init
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: CodeQL — análisis
        uses: github/codeql-action/analyze@v3

  # ── JOB 6: SONARCLOUD ─────────────────────────────────────────────────────
  sonarcloud:
    name: 📊 SAST (SonarCloud)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud
        uses: SonarSource/sonarcloud-github-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── JOB 7: SNYK ───────────────────────────────────────────────────────────
  snyk:
    name: 📦 Dependencias (Snyk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Auditoría Snyk
        uses: snyk/actions/node@0.4.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # ── JOB 8: BUILD + TRIVY ──────────────────────────────────────────────────
  build:
    name: 🐳 Build + Escaneo de imágenes (Trivy)
    runs-on: ubuntu-latest
    # Cuando jest y pact esten prontos, agregarlos en needs!!
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Construir imagen API (NestJS)
        run: |
          docker build \
            -t ${{ env.IMAGE_API }}:${{ env.TAG }} \
            -t ${{ env.IMAGE_API }}:latest \
            -f apps/backend/Dockerfile \
            .

      - name: Construir imagen Web (Next.js)
        run: |
          docker build \
            -t ${{ env.IMAGE_WEB }}:${{ env.TAG }} \
            -t ${{ env.IMAGE_WEB }}:latest \
            --build-arg NEXT_PUBLIC_API_URL=https://staging.bistrolink.app \
            --build-arg NEXT_PUBLIC_WS_URL=wss://staging.bistrolink.app \
            --build-arg NEXT_PUBLIC_KEYCLOAK_URL=https://staging-auth.bistrolink.app \
            --build-arg NEXT_PUBLIC_KEYCLOAK_REALM=bistrolink \
            --build-arg NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=bistrolink-frontend \
            -f apps/frontend/Dockerfile \
            .

      - name: Trivy — escaneo imagen API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_API }}:${{ env.TAG }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: .trivyignore

      - name: Trivy — escaneo imagen Web
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_WEB }}:${{ env.TAG }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: .trivyignore

      - name: Publicar imágenes en GHCR
        if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/')
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ${{ env.IMAGE_API }}:${{ env.TAG }}
          docker push ${{ env.IMAGE_WEB }}:${{ env.TAG }}
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            docker tag ${{ env.IMAGE_API }}:${{ env.TAG }} ${{ env.IMAGE_API }}:${VERSION}
            docker tag ${{ env.IMAGE_WEB }}:${{ env.TAG }} ${{ env.IMAGE_WEB }}:${VERSION}
            docker push ${{ env.IMAGE_API }}:${VERSION}
            docker push ${{ env.IMAGE_WEB }}:${VERSION}
          fi

  # ── JOB 9: DEPLOY STAGING ─────────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy staging (Railway)
    needs: [gitleaks, codeql, sonarcloud, snyk, build]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API en staging
        run: railway redeploy --service bistrolink-api --environment staging --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Web en staging
        run: railway redeploy --service bistrolink-web --environment staging --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Health check staging
        run: |
          sleep 40
          curl -f https://bistrolink-api-staging.up.railway.app/health

