name: CI/CD BistroLink


on:
  push:
    branches: [develop, main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [develop, main]


env:
  IMAGE: ghcr.io/${{ github.repository }}
  TAG:   ${{ github.sha }}


jobs:
  # ── INTEGRACIÓN CONTINUA ─────────────────────────────────────
  ci:
    name: Lint · Tests · SAST · Build · Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4


      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm


      - name: Instalar dependencias
        run: npm ci


      - name: Lint (ESLint + Prettier)
        run: npm run lint


      - name: Tests Jest (cobertura mínima 80%)
        run: npm run test:cov
        env:
          CI: true


      - name: Escaneo de secretos con Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: SAST CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3


      - name: Build NestJS + Next.js
        run: npm run build


      - name: Construir imagen Docker
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ env.TAG }} \
            -t ${{ env.IMAGE }}:latest .


      - name: Trivy — escaneo de imagen Docker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.TAG }}
          severity: CRITICAL,HIGH
          exit-code: 1


      - name: Publicar imagen en GHCR
        if: github.ref == "refs/heads/develop" || startsWith(github.ref, "refs/tags/")
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin
          docker push ${{ env.IMAGE }}:${{ env.TAG }}
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            docker tag ${{ env.IMAGE }}:${{ env.TAG }} ${{ env.IMAGE }}:${VERSION}
            docker push ${{ env.IMAGE }}:${VERSION}
          fi


  # ── DEPLOY STAGING (automático al mergear en develop) ────────
  deploy-staging:
    name: Deploy a staging
    needs: ci
    if: github.ref == "refs/heads/develop"
    runs-on: ubuntu-latest
    steps:
      - name: Disparar deploy en Railway (staging)
        run: curl -fX POST "${{ secrets.RAILWAY_STAGING_WEBHOOK }}"


      - name: Health check staging
        run: |
          sleep 40
          curl -f https://staging.bistrolink.app/health


      - name: Tests E2E Playwright en staging
        run: npx playwright test --reporter=github
        env:
          BASE_URL: https://staging.bistrolink.app


  # ── DEPLOY PRODUCCIÓN (aprobación manual, solo en tag v.*.*) ─
  deploy-prod:
    name: Deploy a producción (requiere aprobación manual)
    needs: deploy-staging
    if: startsWith(github.ref, "refs/tags/v")
    runs-on: ubuntu-latest
    environment: production   # el pipeline se pausa hasta que alguien aprueba
    steps:
      - name: Disparar deploy en Railway (producción)
        run: curl -fX POST "${{ secrets.RAILWAY_PROD_WEBHOOK }}"


      - name: Health check producción
        run: |
          sleep 40
          curl -f https://api.bistrolink.app/health
