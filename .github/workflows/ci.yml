name: CI/CD BistroLink

on:
  push:
    branches: [develop, main]
    tags: ["v*.*.*"]
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [develop, main]
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo del deploy manual"
        required: false
        default: "deploy manual"

permissions:
  contents: read
  security-events: write
  packages: write

env:
  IMAGE_API: ghcr.io/ved-virtualexperiencedevelopment/bistrolink-api
  IMAGE_WEB: ghcr.io/ved-virtualexperiencedevelopment/bistrolink-web
  TAG: ${{ github.sha }}

jobs:
  # ── JOB 1: LINT ───────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint (ESLint + Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

  # ── JOB 2: TESTS UNITARIOS (Jest) ─────────────────────────────────────────
  # jest:
  #   name: 🧪 Tests unitarios (Jest)
